<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ProveIt! — You're Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      background: #0B1120;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 400px;
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(0,212,200,0.2);
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
    }
    .icon { font-size: 56px; margin-bottom: 20px; }
    .logo { font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 6px; }
    .logo span { color: #00D4C8; }
    h1 { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 10px; }
    p { font-size: 14px; color: rgba(255,255,255,0.55); line-height: 1.7; margin-bottom: 28px; }
    .btn {
      display: inline-block;
      background: #00D4C8;
      color: #0B1120;
      font-size: 14px;
      font-weight: 700;
      padding: 12px 28px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .tip {
      margin-top: 24px;
      padding: 14px 16px;
      background: rgba(0,212,200,0.06);
      border-radius: 10px;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <div class="logo">Prove<span>It!</span></div>
    <h1>You're offline</h1>
    <p>It looks like you've lost your internet connection. Connect to Wi-Fi or mobile data and try again.</p>
    <button class="btn" onclick="window.location.reload()">Try Again →</button>
    <div class="tip">
      💡 Tip: If you were busy with a test, your progress may still be saved. Reconnect and log back in — contact your tutor if anything was lost.
    </div>
  </div>
</body>
</html>
